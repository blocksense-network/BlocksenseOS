name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

env:
  NIX_CONFIG: |
    experimental-features = nix-command flakes
    accept-flake-config = true

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate changelog
      id: changelog
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION="${{ github.ref_name }}"
        fi
        
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        
        # Generate changelog between tags
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        if [ -n "$PREV_TAG" ]; then
          echo "## Changes since ${PREV_TAG}" > changelog.md
          git log --pretty=format:"- %s (%an)" ${PREV_TAG}..HEAD >> changelog.md
        else
          echo "## Initial Release" > changelog.md
          echo "First release of BlocksenseOS" >> changelog.md
        fi

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.changelog.outputs.version }}
        release_name: BlocksenseOS ${{ steps.changelog.outputs.version }}
        body_path: changelog.md
        draft: false
        prerelease: false

  build-release-artifacts:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      matrix:
        target: [x86_64-linux, aarch64-linux]
    steps:
    - uses: actions/checkout@v4

    - uses: cachix/install-nix-action@v26
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install just
      run: nix profile install nixpkgs#just

    - name: Build release binaries
      run: just build-release

    - name: Package release artifacts
      run: |
        VERSION=$(echo ${{ github.ref_name }} | sed 's/^v//')
        mkdir -p dist
        
        # Create release package
        tar -czf "dist/blocksense-os-${VERSION}-${{ matrix.target }}.tar.gz" \
          build/ \
          README.md \
          LICENSE \
          docs/

    - name: Upload Release Assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: dist/blocksense-os-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz
        asset_name: blocksense-os-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz
        asset_content_type: application/gzip

  publish-documentation:
    name: Publish Documentation
    runs-on: ubuntu-latest
    needs: create-release
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - uses: cachix/install-nix-action@v26
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install just
      run: nix profile install nixpkgs#just

    - name: Generate documentation
      run: just generate-docs

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs/build